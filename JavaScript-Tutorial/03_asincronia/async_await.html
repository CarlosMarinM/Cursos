<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Async-Await</title>
  </head>

  <body>
    <h1>Async-Await</h1>
    <script>
      const cuadradoPromise = (value) => {
        if (typeof value !== "number")
          return Promise.reject(
            `Error, el valor ${value} ingresado no es un número`
          );
        return new Promise((resolve, reject) => {
          setTimeout(() => {
            resolve({
              value,
              result: value * value,
            });
          }, 0 | (Math.random() * 1000));
        });
      };

      async function funcionAsincronaDeclarada() {
        try {
          console.log("Inicio funcion anonima");

          let result = await cuadradoPromise(0);
          console.log(`Async function: ${result.value}, ${result.result}`);
          result = await cuadradoPromise(1);
          console.log(`Async function: ${result.value}, ${result.result}`);
          result = await cuadradoPromise(2);
          console.log(`Async function: ${result.value}, ${result.result}`);
          result = await cuadradoPromise(3);
          console.log(`Async function: ${result.value}, ${result.result}`);
          result = await cuadradoPromise(4);
          console.log(`Async function: ${result.value}, ${result.result}`);
        } catch (error) {
          console.error(error);
        }
      }

      funcionAsincronaDeclarada();

      const funcionAsincronaExpresada = async () => {
        try {
          console.log("Inicio funcion anonima");

          let result = await cuadradoPromise(5);
          console.log(`Async function: ${result.value}, ${result.result}`);
          result = await cuadradoPromise(6);
          console.log(`Async function: ${result.value}, ${result.result}`);
          result = await cuadradoPromise(7);
          console.log(`Async function: ${result.value}, ${result.result}`);
          result = await cuadradoPromise(8);
          console.log(`Async function: ${result.value}, ${result.result}`);
          result = await cuadradoPromise(9);
          console.log(`Async function: ${result.value}, ${result.result}`);
        } catch (error) {
          console.error(error);
        }
      };

      funcionAsincronaExpresada();
    </script>
  </body>
</html>
