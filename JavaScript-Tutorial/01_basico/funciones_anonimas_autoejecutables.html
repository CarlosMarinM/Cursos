<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Funciones anonimas autoejecutables</title>
  </head>
  <body>
    <h1>Funciones anonimas autoejecutables</h1>
    <script>
      (function () {
        console.log("Mi primer IIFE (Immediately-invoked function expression)");
      })();

      (function (d, w, c) {
        console.log(
          "Mi segunda IIFE (Immediately-invoked function expression)"
        );
        console.log(d);
        console.log(w);
        c.log("Este es un console.log()")
      })(document, window, console);
    </script>
  </body>
</html>
