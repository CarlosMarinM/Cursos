<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alert, Confirm y Prompt</title>
  </head>
  <body>
    <h1>Alert, Confirm y Prompt</h1>
    <script>
      console.log(window);
      let alerta = alert("Esto es una alerta"),
        confirmacion = confirm("Esto es una confirmación"),
        aviso = prompt(
          "Esto es un aviso y le permite al usuario ingresar un valor"
        );

      console.log(alerta);
      console.log(confirmacion);
      console.log(aviso);
    </script>
  </body>
</html>
