<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ejercicio de logica de programacion 003</title>
  </head>

  <body>
    <h1>Ejercicio de logica de programacion 003</h1>
    <script>
      //*********************************************************************************
      // 9) Programa una función que obtenga un numero aleatorio entre 501 y 600.
      const numeroAleatorio = () => Math.round(Math.random() * 100 + 500);
      console.log(numeroAleatorio());

      //*********************************************************************************
      // 10) Programa una función que reciba un número y evalúe si es capicúa o no (que se lee igual en un sentido que en otro), pe. miFuncion(2002) devolverá true.
      const capicua = (numero = 0) => {
        if (!numero) return console.warn("No ingreso un numero");

        if (typeof numero !== "number")
          return console.error("El valor ingresado no es un numero");

        numero = numero.toString();
        let numeroInvertido = numero.split("").reverse().join("");

        return numero === numeroInvertido;
      };

      let numero = 5005;
      console.log(`El numero ${numero} es capicúa: ${capicua(numero)}`);

      //*********************************************************************************
      // 11) Programa una función que calcule el factorial de un número (El factorial de un entero positivo n, se define como el producto de todos los números enteros positivos desde 1 hasta n), pe. miFuncion(5) devolverá 120.
      const factorial = (numero = undefined) => {
        if (numero === undefined) return console.warn("No ingreso un numero");
        if (typeof numero !== "number")
          return console.error("El valor ingresado no es un numero");
        if (numero === 0) return console.warn("El numero no puede ser 0");
        if (Math.sign(numero) === -1)
          return console.warn("Solo se permiten numeros positivos");

        let factorial = 1;
        for (let i = 1; i <= numero; i++) {
          factorial *= i;
        }
        return factorial;
      };

      let numeroDos = 6;
      console.log(
        `El factorial del numero ${numeroDos} es ${factorial(numeroDos)}`
      );
    </script>
  </body>
</html>
