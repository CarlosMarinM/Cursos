<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sets</title>
  </head>

  <body>
    <h1>Sets</h1>
    <script>
      const set = new Set([
        1,
        2,
        3,
        3,
        4,
        true,
        false,
        true,
        {},
        [],
        "hola",
        {},
      ]);
      set.add("Hola");
      set.add("hola");
      set.add([]);
      set.add(1);
      set.add({});
      console.log(set);
      console.log(set.size);

      set.forEach((item) => {
        console.log(item);
      });

      let array = Array.from(set);
      console.log(array);
    </script>
  </body>
</html>
